name: Deploy to AWS

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Resolve app instance
        id: resolve
        run: |
          set -euo pipefail
          instance_id=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Name,Values=svthalexweiler-app" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" \
            --output text)
          if [ -z "$instance_id" ] || [ "$instance_id" = "None" ]; then
            echo "::error::no running svthalexweiler-app instance found"
            exit 1
          fi
          # describe-instances returns newline/tab-separated; take the first match.
          instance_id=$(echo "$instance_id" | awk '{print $1}')
          echo "instance_id=$instance_id" >> "$GITHUB_OUTPUT"
          echo "Resolved instance: $instance_id"

      - name: Trigger SSM deploy
        id: ssm
        env:
          INSTANCE_ID: ${{ steps.resolve.outputs.instance_id }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          # Single-string commands array — AWS-RunShellScript executes it as one
          # bash script, so `set -e` and CWD propagate across lines.
          cat > /tmp/ssm-params.json <<JSON
          {
            "commands": [
              "set -euxo pipefail",
              "if [ ! -d /opt/clubsoft/.git ]; then echo 'bootstrap /opt/clubsoft manually before first deploy'; exit 1; fi",
              "cd /opt/clubsoft",
              "git fetch --all --prune",
              "git checkout --force ${SHA}",
              "docker compose pull || true",
              "docker compose up -d --build"
            ],
            "executionTimeout": ["900"]
          }
          JSON

          cmd_id=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "deploy $SHA" \
            --parameters file:///tmp/ssm-params.json \
            --cloud-watch-output-config CloudWatchOutputEnabled=true \
            --query "Command.CommandId" \
            --output text)
          echo "command_id=$cmd_id" >> "$GITHUB_OUTPUT"
          echo "Dispatched SSM command: $cmd_id"

      - name: Wait for deploy to finish
        env:
          INSTANCE_ID: ${{ steps.resolve.outputs.instance_id }}
          COMMAND_ID: ${{ steps.ssm.outputs.command_id }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 90); do
            status=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "[$attempt] status=$status"
            case "$status" in
              Success)
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query "StandardOutputContent" --output text || true
                exit 0
                ;;
              Failed|Cancelled|TimedOut)
                echo "::error::SSM command $COMMAND_ID ended with status $status"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID"
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "::error::Timed out waiting for SSM command $COMMAND_ID"
          exit 1
