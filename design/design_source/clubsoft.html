<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440" />
<title>Clubsoft — Vereinsverwaltung</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    /* Repo-derived: #121212 background + oklch purple primary — reimagined as a modern dark UI */
    --paper: #0e0e12;           /* near-black, cooler than #121212 for contrast layering */
    --paper-2: #16161c;          /* surface */
    --paper-3: #1e1e26;          /* elevated surface */
    --ink: #f2f1ee;              /* primary text */
    --ink-2: #c9c8c2;            /* secondary */
    --ink-3: #7a7985;            /* tertiary */
    --ink-4: #4a4955;            /* quaternary */
    --rule: #25252e;             /* hairline */
    --rule-2: #35353f;           /* stronger hairline */
    --forest: oklch(0.62 0.22 290);   /* primary: electric purple (repo vibe) */
    --forest-2: oklch(0.70 0.22 290);
    --moss: oklch(0.68 0.18 250);     /* cyan-blue partner */
    --rust: oklch(0.72 0.19 25);      /* hot coral accent */
    --rust-2: oklch(0.78 0.19 25);
    --ochre: oklch(0.78 0.16 85);     /* acid yellow */
    --plum: oklch(0.58 0.22 330);     /* magenta */
    --glow: oklch(0.62 0.22 290 / 0.35);
  }
  html, body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Geist', ui-sans-serif, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01", "cv11";
  }
  .font-display { font-family: 'Newsreader', Georgia, serif; font-feature-settings: "liga", "dlig"; letter-spacing: -0.01em; }
  .font-mono    { font-family: 'Geist Mono', ui-monospace, monospace; }
  .font-ui      { font-family: 'Geist', ui-sans-serif, system-ui, sans-serif; }

  /* ambient glow — modern dark-UI depth */
  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    opacity: .7;
    z-index: 0;
    background-image:
      radial-gradient(ellipse 800px 500px at 15% 0%, oklch(0.45 0.2 290 / 0.18), transparent 60%),
      radial-gradient(ellipse 900px 600px at 100% 100%, oklch(0.5 0.18 25 / 0.10), transparent 60%);
  }
  /* subtle noise grain for that tactile modern-dark feel */
  body::after {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    opacity: .025;
    z-index: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='1'/></svg>");
    mix-blend-mode: overlay;
  }
  #root { position: relative; z-index: 1; }

  /* scrollbars */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--rule-2); border-radius: 999px; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* focus rings */
  .cs-focus:focus-visible { outline: 2px solid var(--forest); outline-offset: 2px; }

  /* tight caps */
  .caps { letter-spacing: 0.14em; text-transform: uppercase; font-feature-settings: "ss01"; }

  /* hairlines */
  .rule-b { border-bottom: 1px solid var(--rule); }
  .rule-t { border-top: 1px solid var(--rule); }
  .rule-x { border-left: 1px solid var(--rule); border-right: 1px solid var(--rule); }
  .rule { border-color: var(--rule); }

  /* buttons */
  .btn-primary { background: var(--forest); color: #fff; box-shadow: 0 1px 0 rgba(255,255,255,.15) inset, 0 8px 24px -10px var(--glow); }
  .btn-primary:hover { background: var(--forest-2); box-shadow: 0 1px 0 rgba(255,255,255,.2) inset, 0 10px 30px -8px var(--glow); }
  .btn-ghost { background: var(--paper-2); color: var(--ink); border: 1px solid var(--rule-2); }
  .btn-ghost:hover { background: var(--paper-3); border-color: var(--ink-4); }
  .btn-rust { background: var(--rust); color: #fff; }
  .btn-rust:hover { background: var(--rust-2); }

  /* chip */
  .chip { display: inline-flex; align-items: center; gap: .375rem; padding: .125rem .5rem; border-radius: 999px; font-size: 11px; letter-spacing: .02em; }
  .chip-dot { width: 6px; height: 6px; border-radius: 999px; background: currentColor; }

  /* striped placeholder */
  .stripes {
    background-image: repeating-linear-gradient(135deg, rgba(255,255,255,.04) 0 8px, transparent 8px 16px);
  }
  .stripes-rust {
    background-image: repeating-linear-gradient(135deg, oklch(0.72 0.19 25 / 0.18) 0 8px, transparent 8px 16px);
    background-color: oklch(0.72 0.19 25 / 0.06);
  }
  .stripes-forest {
    background-image: repeating-linear-gradient(135deg, oklch(0.62 0.22 290 / 0.22) 0 8px, transparent 8px 16px);
    background-color: oklch(0.62 0.22 290 / 0.08);
  }

  /* drag handle dots */
  .drag-dots {
    background-image: radial-gradient(var(--ink-4) 1px, transparent 1px);
    background-size: 4px 4px;
    background-position: 0 0;
  }

  /* page transitions */
  .page-enter { animation: pageIn .22s cubic-bezier(.2,.7,.2,1) both; }
  @keyframes pageIn { from { opacity: .4; transform: translateY(3px); } to { opacity: 1; transform: none; } }

  /* ticker */
  @keyframes tick { 0%{opacity:.2} 50%{opacity:1} 100%{opacity:.2} }
  .live-dot { animation: tick 1.6s ease-in-out infinite; }

  /* table row hover */
  .row-hover { transition: background .15s; }
  .row-hover:hover { background: var(--paper-3); }

  /* sparkline */
  .spark path { stroke-linejoin: round; stroke-linecap: round; }

  /* Tweaks panel */
  .tweaks {
    position: fixed; right: 20px; bottom: 20px;
    background: var(--ink);
    color: var(--paper);
    border-radius: 12px;
    box-shadow: 0 20px 60px -20px rgba(0,0,0,.5);
    padding: 14px 16px;
    width: 280px;
    z-index: 100;
    font-size: 12px;
    display: none;
  }
  .tweaks.open { display: block; }
  .tweaks label { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin: 8px 0; }
  .tweaks input[type="range"] { width: 120px; accent-color: var(--rust); }
  .tweaks select { background: var(--ink-2); color: var(--paper); border: 1px solid var(--ink-3); padding: 4px 8px; border-radius: 6px; font-size: 12px; }

  /* modal */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(4px); z-index: 90; display: flex; align-items: center; justify-content: center; }
  .modal { background: var(--paper-2); border: 1px solid var(--rule-2); border-radius: 10px; width: 640px; max-width: 94vw; max-height: 90vh; overflow: auto; box-shadow: 0 30px 80px -20px rgba(0,0,0,.6); }

  /* toast */
  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: var(--paper-3); color: var(--ink); padding: 10px 16px; border-radius: 999px; font-size: 13px; z-index: 120; display: flex; align-items: center; gap: 8px; box-shadow: 0 10px 40px -10px rgba(0,0,0,.6), 0 0 0 1px var(--rule-2); animation: toastIn .3s cubic-bezier(.2,.7,.2,1); }
  @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 8px); } to { opacity: 1; transform: translate(-50%, 0); } }

  /* input */
  .cs-input { background: var(--paper); border: 1px solid var(--rule-2); padding: 8px 10px; border-radius: 6px; font-size: 13px; width: 100%; color: var(--ink); transition: border-color .15s, box-shadow .15s; }
  .cs-input:focus { outline: none; border-color: var(--forest); box-shadow: 0 0 0 3px var(--glow); }

  /* sidebar item */
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 6px; color: var(--ink-2); font-size: 13.5px; cursor: pointer; position: relative; }
  .nav-item:hover { background: var(--paper-3); color: var(--ink); }
  .nav-item.active { background: linear-gradient(180deg, oklch(0.62 0.22 290 / 0.15), oklch(0.62 0.22 290 / 0.05)); color: var(--ink); box-shadow: 0 0 0 1px var(--rule-2) inset; }
  .nav-item.active::before { content: ""; position: absolute; left: 0; top: 6px; bottom: 6px; width: 2px; background: var(--forest); border-radius: 2px; box-shadow: 0 0 12px var(--glow); }
  .nav-item.active .nav-icon { color: var(--forest-2); }
  .nav-icon { width: 16px; height: 16px; flex-shrink: 0; color: var(--ink-3); }

  /* kbd */
  kbd { font-family: 'Geist Mono', monospace; font-size: 10.5px; padding: 1px 5px; background: var(--paper-3); border: 1px solid var(--rule-2); border-radius: 4px; color: var(--ink-2); }

  /* rounded cards feel modern */
  .cs-card { border-radius: 10px !important; }
</style>
</head>
<body>
<div id="root"></div>

</body>
